<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KairoRM — code map</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #0f0f0f;
    --panel-2: #141414;
    --line: rgba(255,255,255,0.09);
    --line-strong: rgba(255,255,255,0.16);
    --fg: #ededed;
    --fg-dim: #a0a0a0;
    --fg-faint: #5c5c5c;
    --warn: #e9a23b;
    --live: #4cc38a;
    --grid: rgba(255,255,255,0.022);
    --sans: "Geist", system-ui, -apple-system, "Segoe UI", sans-serif;
    --mono: "Geist Mono", ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }
  * { box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-weight: 400;
    line-height: 1.65;
    font-size: 15px;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 56px 56px;
    -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, #000 0%, transparent 75%);
    mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, #000 0%, transparent 75%);
    pointer-events: none;
    z-index: 0;
  }
  .wrap { position: relative; z-index: 1; max-width: 880px; margin: 0 auto; padding: 0 28px 120px; }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 0 0;
  }
  .brand { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 13px; letter-spacing: 0.02em; color: var(--fg-dim); }
  .brand .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--live); box-shadow: 0 0 0 4px rgba(76,195,138,0.12); }
  .gen { font-family: var(--mono); font-size: 12px; color: var(--fg-faint); }

  /* Hero */
  .hero { padding: 64px 0 44px; border-bottom: 1px solid var(--line); }
  .kicker { font-family: var(--mono); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-faint); margin: 0 0 18px; }
  h1 { font-weight: 500; font-size: 46px; line-height: 1.05; letter-spacing: -0.025em; margin: 0; }
  h1 .repo { color: var(--fg); }
  .lede { color: var(--fg-dim); font-size: 16px; max-width: 60ch; margin: 18px 0 0; font-weight: 300; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; margin: 40px 0 0; background: var(--line); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .stat { background: var(--panel); padding: 18px 20px; }
  .stat .v { font-size: 26px; font-weight: 500; letter-spacing: -0.02em; font-family: var(--mono); }
  .stat .l { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-faint); margin-top: 4px; }
  .stat .v small { font-size: 14px; color: var(--fg-faint); font-weight: 400; }

  /* Language bar */
  .langs { margin-top: 22px; }
  .langbar { display: flex; height: 6px; border-radius: 99px; overflow: hidden; background: var(--panel-2); }
  .langbar > span { height: 100%; transition: width .8s var(--ease); }
  .langlegend { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 12px; font-family: var(--mono); font-size: 12px; color: var(--fg-dim); }
  .langlegend i { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 7px; vertical-align: 0; }

  /* Sections */
  section { padding: 52px 0; border-bottom: 1px solid var(--line); }
  .seclabel { font-family: var(--mono); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-faint); margin: 0 0 22px; display: flex; align-items: center; gap: 12px; }
  .seclabel::after { content: ""; flex: 1; height: 1px; background: var(--line); }
  .prose { font-size: 17px; line-height: 1.8; color: var(--fg); max-width: 64ch; font-weight: 300; }

  /* Module map */
  .modules { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .module { background: var(--panel); padding: 20px 22px; transition: background .2s ease; }
  .module:hover { background: var(--panel-2); }
  .module .mname { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--fg); }
  .module .mpath { font-family: var(--mono); font-size: 12px; color: var(--fg-faint); margin-top: 2px; }
  .module .mresp { font-size: 14px; color: var(--fg-dim); margin-top: 12px; line-height: 1.6; }

  /* Two-col */
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
  .entry { padding: 14px 0; border-bottom: 1px solid var(--line); }
  .entry:last-child { border-bottom: none; }
  .entry .en { font-family: var(--mono); font-size: 14px; font-weight: 500; }
  .entry .ef { font-family: var(--mono); font-size: 12px; color: var(--fg-faint); }
  .entry .ed { font-size: 13px; color: var(--fg-dim); margin-top: 6px; }
  .pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill { font-family: var(--mono); font-size: 13px; color: var(--fg-dim); border: 1px solid var(--line-strong); border-radius: 7px; padding: 6px 12px; transition: border-color .2s, color .2s; }
  .pill:hover { border-color: var(--fg-faint); color: var(--fg); }

  /* Risks */
  .risk { display: flex; gap: 12px; align-items: flex-start; background: rgba(233,162,59,0.05); border: 1px solid rgba(233,162,59,0.22); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; font-family: var(--mono); font-size: 13px; color: #f0c27f; }
  .risk svg { flex: none; margin-top: 1px; }

  /* Steps */
  ol.steps { counter-reset: s; list-style: none; padding: 0; margin: 0; max-width: 64ch; }
  ol.steps li { counter-increment: s; position: relative; padding: 14px 0 14px 44px; border-bottom: 1px solid var(--line); color: var(--fg-dim); font-size: 15px; }
  ol.steps li:last-child { border-bottom: none; }
  ol.steps li::before { content: counter(s, decimal-leading-zero); position: absolute; left: 0; top: 14px; font-family: var(--mono); font-size: 12px; color: var(--fg-faint); }

  /* Q&A */
  .qa { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; overflow: hidden; }
  .qa-head { padding: 18px 22px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 10px; }
  .qa-head .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--live); }
  .qa-head .t { font-family: var(--mono); font-size: 13px; color: var(--fg-dim); }
  .qa-log { padding: 8px 22px; max-height: 460px; overflow-y: auto; }
  .msg { padding: 16px 0; border-bottom: 1px solid var(--line); }
  .msg:last-child { border-bottom: none; }
  .msg .who { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-faint); margin-bottom: 8px; }
  .msg.user .who { color: var(--fg-dim); }
  .msg .body { font-size: 15px; line-height: 1.7; color: var(--fg); white-space: pre-wrap; }
  .msg .body code { font-family: var(--mono); font-size: 13px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 5px; padding: 1px 6px; }
  .msg .meta { font-family: var(--mono); font-size: 11px; color: var(--fg-faint); margin-top: 10px; }
  .empty { color: var(--fg-faint); font-size: 14px; padding: 28px 0; text-align: center; }
  .typing span { display: inline-block; width: 5px; height: 5px; margin-right: 4px; border-radius: 50%; background: var(--fg-faint); animation: blink 1.2s infinite ease-in-out; }
  .typing span:nth-child(2) { animation-delay: .2s; } .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:.2; transform:translateY(0)} 40%{opacity:1; transform:translateY(-3px)} }
  .qa-input { display: flex; gap: 10px; padding: 16px 22px; border-top: 1px solid var(--line); }
  .qa-input input { flex: 1; background: var(--bg); border: 1px solid var(--line-strong); border-radius: 9px; color: var(--fg); font-family: var(--sans); font-size: 14px; padding: 11px 14px; outline: none; transition: border-color .2s; }
  .qa-input input:focus { border-color: var(--fg-faint); }
  .qa-input button { background: var(--fg); color: #0a0a0a; border: none; border-radius: 9px; font-family: var(--mono); font-size: 13px; font-weight: 500; padding: 0 18px; cursor: pointer; transition: transform .15s var(--ease), opacity .2s; }
  .qa-input button:hover { opacity: .88; } .qa-input button:active { transform: scale(0.97); }
  .qa-input button:disabled { opacity: .4; cursor: default; }
  .suggest { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 22px 18px; }
  .suggest button { background: transparent; border: 1px solid var(--line); border-radius: 7px; color: var(--fg-dim); font-family: var(--sans); font-size: 13px; padding: 7px 12px; cursor: pointer; transition: border-color .2s, color .2s; }
  .suggest button:hover { border-color: var(--fg-faint); color: var(--fg); }

  footer { padding: 40px 0 0; font-family: var(--mono); font-size: 12px; color: var(--fg-faint); text-align: center; }

  /* Reveal motion */
  .reveal { opacity: 0; transform: translateY(16px); transition: opacity .6s var(--ease), transform .6s var(--ease); transition-delay: calc(var(--i, 0) * 55ms); }
  .reveal.in { opacity: 1; transform: none; }

  @media (max-width: 640px) {
    .wrap { padding: 0 18px 80px; }
    h1 { font-size: 34px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .modules, .cols { grid-template-columns: 1fr; }
  }
  @media (prefers-reduced-motion: reduce) {
    .reveal { opacity: 1; transform: none; transition: none; }
    .langbar > span { transition: none; }
    .typing span { animation: none; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><span class="dot"></span>KAIRO<span style="color:var(--fg-faint)">RM</span></div>
      <div class="gen" id="gen"></div>
    </div>

    <header class="hero">
      <p class="kicker reveal">Codebase map</p>
      <h1 class="reveal" style="--i:1"><span class="repo" id="repo"></span></h1>
      <p class="lede reveal" id="summary" style="--i:2"></p>
      <div class="stats reveal" id="stats" style="--i:3"></div>
      <div class="langs reveal" id="langs" style="--i:4"></div>
    </header>

    <section>
      <p class="seclabel reveal">Architecture</p>
      <p class="prose reveal" id="arch" style="--i:1"></p>
    </section>

    <section id="sec-modules">
      <p class="seclabel reveal">Module map</p>
      <div class="modules reveal" id="modules"></div>
    </section>

    <section>
      <div class="cols">
        <div>
          <p class="seclabel reveal">Entry points</p>
          <div class="reveal" id="entries" style="--i:1"></div>
        </div>
        <div>
          <p class="seclabel reveal">Key dependencies</p>
          <div class="pills reveal" id="deps" style="--i:1"></div>
        </div>
      </div>
    </section>

    <section id="sec-risks" hidden>
      <p class="seclabel reveal">Circular dependencies</p>
      <div class="reveal" id="risks" style="--i:1"></div>
    </section>

    <section>
      <p class="seclabel reveal">Contributor quickstart</p>
      <ol class="steps reveal" id="steps" style="--i:1"></ol>
    </section>

    <section style="border-bottom:none">
      <p class="seclabel reveal">Ask the codebase</p>
      <div class="qa reveal" style="--i:1">
        <div class="qa-head"><span class="dot"></span><span class="t" id="qa-title">live Q&amp;A</span></div>
        <div class="qa-log" id="log"><div class="empty">Ask anything about this repository — grounded in its actual code.</div></div>
        <div class="suggest" id="suggest"></div>
        <form class="qa-input" id="form" autocomplete="off">
          <input id="q" placeholder="How does the ingestion pipeline work?" aria-label="Ask a question" />
          <button type="submit" id="send">Ask</button>
        </form>
      </div>
    </section>

    <footer>Generated by KairoRM · code intelligence engine</footer>
  </div>

<script>window.__KAIRO__ = "__KAIRO_DATA__";</script>
<script>
(function () {
  var D = window.__KAIRO__ || {};
  var $ = function (id) { return document.getElementById(id); };
  var esc = function (s) { var d = document.createElement("div"); d.textContent = s == null ? "" : String(s); return d.innerHTML; };
  var base = function (p) { if (!p) return ""; p = String(p).replace(/\/+$/, ""); var parts = p.split(/[\\/]/); return parts[parts.length - 1] || p; };

  var PALETTE = ["#ededed","#7a7a7a","#4cc38a","#e9a23b","#5b8def","#c678dd","#56b6c2","#d19a66"];

  // Header
  $("repo").textContent = D.repo_name || "repository";
  $("summary").textContent = (D.architecture_summary || "").split(/(?<=\.)\s+/).slice(0, 2).join(" ");
  $("arch").textContent = D.architecture_summary || "No architecture summary was produced.";
  if (D.generated_at) {
    var dt = new Date(D.generated_at);
    $("gen").textContent = isNaN(dt) ? "" : dt.toISOString().slice(0, 16).replace("T", " ") + " UTC";
  }

  // Stats
  var st = D.stats || {};
  var langCount = st.languages ? Object.keys(st.languages).length : 0;
  var cells = [
    [st.files != null ? st.files : "—", "files"],
    [st.chunks != null ? st.chunks : "—", "chunks"],
    [langCount || "—", langCount === 1 ? "language" : "languages"],
    [(D.complexity_score != null ? D.complexity_score : "—"), "complexity", "/10"]
  ];
  $("stats").innerHTML = cells.map(function (c) {
    return '<div class="stat"><div class="v">' + esc(c[0]) + (c[2] ? '<small>' + esc(c[2]) + '</small>' : '') + '</div><div class="l">' + esc(c[1]) + '</div></div>';
  }).join("");

  // Language bar
  if (st.languages && langCount) {
    var entries = Object.keys(st.languages).map(function (k) { return [k, st.languages[k]]; })
      .sort(function (a, b) { return b[1] - a[1]; });
    var total = entries.reduce(function (s, e) { return s + e[1]; }, 0) || 1;
    var bar = entries.map(function (e, i) {
      var col = PALETTE[i % PALETTE.length];
      return '<span style="width:0;background:' + col + '" data-w="' + ((e[1] / total) * 100).toFixed(1) + '"></span>';
    }).join("");
    var legend = entries.slice(0, 6).map(function (e, i) {
      var col = PALETTE[i % PALETTE.length];
      return '<span><i style="background:' + col + '"></i>' + esc(e[0]) + ' ' + Math.round((e[1] / total) * 100) + '%</span>';
    }).join("");
    $("langs").innerHTML = '<div class="langbar">' + bar + '</div><div class="langlegend">' + legend + '</div>';
    requestAnimationFrame(function () {
      setTimeout(function () {
        Array.prototype.forEach.call($("langs").querySelectorAll(".langbar > span"), function (s) { s.style.width = s.getAttribute("data-w") + "%"; });
      }, 300);
    });
  }

  // Modules
  $("modules").innerHTML = (D.modules || []).map(function (m) {
    return '<div class="module"><div class="mname">' + esc(m.name) + '</div><div class="mpath">' + esc(base(m.path)) + '/</div><div class="mresp">' + esc(m.responsibility) + '</div></div>';
  }).join("") || '<div class="module"><div class="mresp">No modules identified.</div></div>';

  // Entry points
  $("entries").innerHTML = (D.entry_points || []).map(function (e) {
    return '<div class="entry"><div class="en">' + esc(e.name) + '</div><div class="ef">' + esc(e.file) + '</div><div class="ed">' + esc(e.description) + '</div></div>';
  }).join("") || '<div class="entry"><div class="ed">None identified.</div></div>';

  // Deps
  $("deps").innerHTML = (D.key_dependencies || []).map(function (d) { return '<span class="pill">' + esc(d) + '</span>'; }).join("") || '<span class="pill">none</span>';

  // Risks
  var risks = D.circular_risks || [];
  if (risks.length) {
    $("sec-risks").hidden = false;
    var warn = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#e9a23b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
    $("risks").innerHTML = risks.map(function (r) { return '<div class="risk">' + warn + '<span>' + esc(r) + '</span></div>'; }).join("");
  }

  // Steps
  $("steps").innerHTML = (D.contributor_quickstart || []).map(function (s) { return '<li>' + esc(s) + '</li>'; }).join("") || '<li>No steps identified.</li>';

  // Suggestions
  var sugg = ["What does this project do?", "How is the code structured?", "Where do I start contributing?"];
  $("suggest").innerHTML = sugg.map(function (s) { return '<button type="button">' + esc(s) + '</button>'; }).join("");
  Array.prototype.forEach.call($("suggest").querySelectorAll("button"), function (b) {
    b.addEventListener("click", function () { $("q").value = b.textContent; ask(); });
  });

  // Reveal on scroll
  var io = new IntersectionObserver(function (ents) {
    ents.forEach(function (en) { if (en.isIntersecting) { en.target.classList.add("in"); io.unobserve(en.target); } });
  }, { threshold: 0.12, rootMargin: "0px 0px -40px 0px" });
  Array.prototype.forEach.call(document.querySelectorAll(".reveal"), function (el) { io.observe(el); });

  // Q&A
  var log = $("log"), busy = false;
  function add(who, html, meta) {
    if (log.querySelector(".empty")) log.innerHTML = "";
    var div = document.createElement("div");
    div.className = "msg reveal " + who;
    div.innerHTML = '<div class="who">' + (who === "user" ? "you" : "kairo") + '</div><div class="body">' + html + '</div>' + (meta ? '<div class="meta">' + esc(meta) + '</div>' : '');
    log.appendChild(div);
    requestAnimationFrame(function () { div.classList.add("in"); });
    log.scrollTop = log.scrollHeight;
    return div;
  }
  function fmt(t) {
    return esc(t).replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\*\*([^*]+)\*\*/g, '<strong style="font-weight:500">$1</strong>');
  }
  function ask() {
    var q = $("q").value.trim();
    if (!q || busy) return;
    busy = true; $("send").disabled = true;
    add("user", esc(q));
    $("q").value = "";
    var t = add("kairo", '<span class="typing"><span></span><span></span><span></span></span>');
    fetch("/ask", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ question: q }) })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        t.querySelector(".body").innerHTML = fmt(d.answer || "No answer.");
        if (d.chunks_used != null) t.insertAdjacentHTML("beforeend", '<div class="meta">grounded in ' + d.chunks_used + ' code chunk' + (d.chunks_used === 1 ? '' : 's') + '</div>');
      })
      .catch(function () { t.querySelector(".body").innerHTML = "Something went wrong reaching the server."; })
      .finally(function () { busy = false; $("send").disabled = false; log.scrollTop = log.scrollHeight; });
  }
  $("form").addEventListener("submit", function (e) { e.preventDefault(); ask(); });
})();
</script>
</body>
</html>
